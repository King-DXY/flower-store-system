# ============================================================
# docker-compose.yml — 鲜花商城一键部署
# 启动命令：docker-compose up -d
# 包含：MySQL 8 + Redis 7 + Spring Boot 应用
# ============================================================

version: "3.8"

services:

  # ---------- MySQL 数据库 ----------
  mysql:
    image: mysql:8.0
    container_name: flower-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: flowersalessysterm
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql           # 数据持久化
      - ./doc/schema-init.sql:/docker-entrypoint-initdb.d/init.sql  # 首次启动自动建表
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis 缓存 ----------
  redis:
    image: redis:7-alpine
    container_name: flower-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------- Spring Boot 应用 ----------
  app:
    build: .
    container_name: flower-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: flowersalessysterm
      DB_USER: root
      DB_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql-data:
