# ============================================================
# 开发环境配置
# 用 --spring.profiles.active=dev 激活
# ============================================================
server:
  port: 18080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/flowersalessysterm?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

# 文件上传目录
file:
  upload-dir: uploads

# 开发环境：打印详细 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 直接打印到控制台

# 日志级别
logging:
  level:
    com.flowershop: DEBUG    # 项目代码 DEBUG 级别
    root: INFO               # 其他包 INFO 级别
