# ============================================================
# 鲜花商城 — 主配置文件
# ============================================================
server:
  port: 8080

spring:
  profiles:
    active: dev   # 默认使用开发环境配置

  # 数据源配置（HikariCP 连接池）
  datasource:
    url: jdbc:mysql://localhost:3306/flowersalessysterm?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5           # 最少空闲连接
      maximum-pool-size: 20     # 最大连接数
      idle-timeout: 300000      # 空闲超时 5 分钟
      connection-timeout: 20000 # 获取连接等待超时 20 秒

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# Actuator 健康监控
management:
  endpoints:
    web:
      exposure:
        include: health,info   # 暴露 health 和 info 端点
  endpoint:
    health:
      show-details: always     # 显示详细信息

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml   # XML 映射文件位置
  type-aliases-package: com.flowershop.entity      # 实体类包
  configuration:
    map-underscore-to-camel-case: true             # 下划线转驼峰：flower_name → flowerName
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl  # SQL 日志走 Slf4j
  global-config:
    db-config:
      id-type: auto                                # 主键自增
      logic-delete-field: deleted                  # 逻辑删除字段
      logic-delete-value: 1                        # 已删除
      logic-not-delete-value: 0                    # 未删除

# JWT 配置
jwt:
  secret: flower-store-system-secret-key-2024-min-32-chars!!
  expiration: 86400000   # Token 有效期：24 小时（毫秒）

# Knife4j API 文档
knife4j:
  enable: true
  setting:
    language: zh_cn      # 中文界面
